name: Primer flujo de trabajo CI/CD (Build, Test and Push Docker Image)

# ===== Disparadores del workflow =====
on:
  push:
    branches:
      - '**'

# ===== Permisos =====
permissions:
  contents: read
  packages: write

# ===== Tareas del workflow =====
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Descarga código
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. JDK/Maven para tests previos
      - name: Configuración pasar TEST
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '23' # Cambiado a 21 (LTS) o la que soporte tu proyecto, 23 es muy reciente

      - name: Construir proyecto con Maven
        run: mvn clean package

      # 3. Convertir nombre del repositorio a minúsculas
      - name: Set lowercase repo name
        run: |
          echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 4. Login en GitHub Container Registry (GHCR)
      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Construir y subir la imagen Docker
      - name: Build and Push Docker image
        run: |
          docker build -t ghcr.io/${{ env.REPO_LOWER }}:latest .
          docker push ghcr.io/${{ env.REPO_LOWER }}:latest
